appId: com.example.unnamedproject
---
- launchApp

# Wait for the games to load and verify it is selected and loaded
- assertVisible:
    id: "game_item__index_0__selected_true__loaded_true"

# Long press the first game item
- longPressOn:
    id: "game_item__index_0__selected_true__loaded_true"

# Assert that the bottom sheet actions are visible
- assertVisible:
    id: "game_action_sheet_content"
- assertVisible: "Favorite"
- assertVisible: "Hide"
- assertVisible: "Edit"
