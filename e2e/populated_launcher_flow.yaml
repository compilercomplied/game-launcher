appId: com.example.unnamedproject
---
- launchApp

- assertVisible: "Unnamed Project" 

- assertVisible: "SuperTuxKart"
- assertVisible: "Unciv"

# Verify first item exists and wait for its cover to load
- assertVisible:
    id: "game_item__index_0.*"
- extendedWaitUntil:
    visible:
        id: "game_item__index_0.*__loaded_true"
    timeout: 15000

# Verify second item exists and wait for its cover to load
- assertVisible:
    id: "game_item__index_1.*"
- extendedWaitUntil:
    visible:
        id: "game_item__index_1.*__loaded_true"
    timeout: 15000
