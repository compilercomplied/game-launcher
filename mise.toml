[tools]
java = "temurin-21"
gradle = "8.7"
android-sdk = "latest"

[env]
ANDROID_HOME = "/Users/gdario/.local/share/mise/installs/android-sdk/1.0"
_.path = [
  "/Users/gdario/.local/share/mise/installs/android-sdk/1.0/platform-tools",
  "{{env.HOME}}/.maestro/bin"
]

[tasks.project-setup]
description = "Initialize SDKs, create Emulator (AVD), and install tools (Maestro)"
run = "./scripts/setup-project.sh"

[tasks.build]
description = "Build the application"
run = "./gradlew assembleDebug"

[tasks.screenshot-record]
description = "Record new screenshots with Roborazzi"
run = "./gradlew recordRoborazziDebug"

[tasks.screenshot-compare]
description = "Compare current UI against baselines and generate a report"
run = "./gradlew compareRoborazziDebug"

[tasks.screenshot-verify]
description = "Verify screenshots and fail if they don't match"
run = "./gradlew verifyRoborazziDebug"

[tasks.test-unit]
description = "Run JVM-based tests"
run = "./gradlew testDebugUnitTest -q --console=plain --rerun-tasks"

[tasks.test-e2e]
description = "Run end-to-end tests using Maestro. Supports full paths, or just filenames (e.g. 'mise run test-e2e empty_launcher_flow')"
run = "./scripts/run-e2e.sh $@"

[tasks."test-manual"]
description = "Launch emulator into a specific snapshot (default: populated_state) with the latest app installed"
depends = ["build"]
run = "./scripts/test-manual.sh"

[tasks."test-all"]
description = "Run all automated tests"
run = """
mise run test-unit
mise run test-e2e
"""

[tasks."install-app"]
description = "Install app in physical phone for manual testing"
depends = ["build"]
run = "adb -s adb-55291FDCH0040K-kPfxId._adb-tls-connect._tcp install -r app/build/outputs/apk/debug/app-debug.apk"

[tasks."static-analysis"]
description = "Run android linter"
run = "./gradlew :app:lintDebug"
