[tools]
java = "temurin-21"
gradle = "8.7"
android-sdk = "latest"

[tasks.project-setup]
description = "Initialize SDKs, create Emulator (AVD), and install tools (Maestro)"
run = "./scripts/setup-project.sh"

[tasks.build]
description = "Build the application"
run = "./gradlew assembleDebug"

[tasks.screenshot-record]
description = "Record new screenshots with Roborazzi"
run = "./gradlew recordRoborazziDebug"

[tasks.screenshot-compare]
description = "Compare current UI against baselines and generate a report"
run = "./gradlew compareRoborazziDebug"

[tasks.screenshot-verify]
description = "Verify screenshots and fail if they don't match"
run = "./gradlew verifyRoborazziDebug"

[tasks.test-unit]
description = "Run JVM-based tests"
run = "./gradlew testDebugUnitTest"

[tasks.test-e2e]
description = "Run end-to-end tests using Maestro"
run = "./scripts/run-e2e.sh"

[tasks."test-manual"]
description = "Launch emulator into a specific snapshot (default: clean_state) with the latest app installed"
depends = ["build"]
run = """
source scripts/.env.sh
source scripts/.logging.sh
SNAPSHOT=${1:-clean_state}
APK_PATH="app/build/outputs/apk/debug/app-debug.apk"

log_banner "Manual Test: $SNAPSHOT"
android emulator start "$AVD_NAME"

log_step "Loading snapshot..."
adb emu avd snapshot load "$SNAPSHOT"
sleep 2

log_step "Installing latest APK..."
adb install -r "$APK_PATH"

log_success "Emulator ready at $SNAPSHOT with latest build"
"""
